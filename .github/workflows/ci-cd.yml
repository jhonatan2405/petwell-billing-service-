name: CI/CD — Billing Service

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20.x'

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: CI — Lint, Type-check, Test, Build
  # ─────────────────────────────────────────────────────────────────────────────
  ci:
    name: 🧪 CI — Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código fuente
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🔍 Verificar tipos TypeScript
        run: npx tsc --noEmit

      - name: 🧪 Ejecutar pruebas con cobertura
        run: npm run test:coverage
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret_for_ci
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BOLD_SECRET_KEY: test_bold_key
          DISABLE_WEBHOOK_SIGNATURE: 'true'
          APPOINTMENT_SERVICE_URL: http://localhost:3005
          NOTIFICATION_SERVICE_URL: http://localhost:3007
          INTERNAL_SERVICE_KEY: petwell_internal_secret

      - name: 🏗️ Compilar TypeScript → JavaScript
        run: npm run build

      - name: 📊 Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-billing
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: CD — Deploy a Render (solo en push a main, si CI pasa)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy → Render
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 🚀 Disparar deploy en Render
        run: |
          echo "Triggering Render deploy for billing-service..."
          curl -s -o /dev/null -w "%{http_code}" \
            --request POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_BILLING }}"
          echo " → Deploy trigger sent"

      - name: ✅ Deploy iniciado exitosamente
        run: echo "🎉 Billing Service desplegado en Render"
